name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: cd API-Scenarios && npm ci
    - name: Run tests
      run: cd API-Scenarios && npm test

  ui-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: cd UI-Scenarios && npm ci
    - name: Run Cypress tests
      run: cd UI-Scenarios && npx cypress run --headless --browser electron

  mobile-tests:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies
      run: cd Mobile-Scenarios && npm ci
    - name: Install Appium and XCUITest driver
      run: |
        npm install -g appium
        appium driver install xcuitest
    - name: Boot iOS Simulator
      run: |
        UDID=$(xcrun simctl list devices available | grep "iPhone 15" | grep -v "Plus\|Pro" | head -1 | awk -F'[()]' '{print $2}')
        echo "Booting simulator: $UDID"
        xcrun simctl boot "$UDID" || true
        xcrun simctl bootstatus "$UDID" -b
    - name: Run WebDriverIO tests
      run: cd Mobile-Scenarios && npx wdio run wdio.ios.conf.js